name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.github/**'
      - '.prettierrc'
      - 'eslint.config.js'
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (leave empty for auto-detect)'
        required: false
        type: choice
        options:
          - auto
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write
  packages: write
  pages: write

# Parallel releases would race on the version bump and publish
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Version Bump & Publish
    runs-on: ubuntu-latest
    environment: npm
    # Skip the bot's own release commit so a release doesn't re-trigger itself
    if: "!contains(github.event.head_commit.message, 'chore: release')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Validate pushed commits
        run: |
          BEFORE="${{ github.event.before }}"
          # "before" is unusable on workflow_dispatch, new branches and force pushes
          if [ -n "$BEFORE" ] && [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE" 2>/dev/null; then
            npx commitlint --from "$BEFORE" --to HEAD --verbose
          elif git rev-parse HEAD~1 >/dev/null 2>&1; then
            npx commitlint --from HEAD~1 --to HEAD --verbose
          fi
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # feat -> minor, BREAKING CHANGE -> major, anything else -> patch
      - name: Determine version bump
        id: bump
        run: |
          MANUAL="${{ github.event.inputs.bump || 'auto' }}"
          if [ "$MANUAL" != "auto" ]; then
            echo "type=$MANUAL" >> "$GITHUB_OUTPUT"
            echo "Manual bump: $MANUAL"
            exit 0
          fi

          if git describe --tags --abbrev=0 >/dev/null 2>&1; then
            LAST_TAG=$(git describe --tags --abbrev=0)
            COMMITS=$(git log "${LAST_TAG}..HEAD" --oneline)
          else
            COMMITS=$(git log --oneline)
          fi

          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|!:"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$COMMITS" | grep -qiE "\bfeat(\(.+\))?[!]?:"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump version
        id: version
        run: |
          NEW_VERSION=$(npm version ${{ steps.bump.outputs.type }} --no-git-tag-version)
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "Bumped to $NEW_VERSION (${{ steps.bump.outputs.type }})"

      - name: Rebuild with bumped version
        run: npm run build

      - name: Build signed official plugin catalog
        env:
          DOCKSCOPE_PLUGIN_PACKAGE_PRIVATE_KEY: ${{ secrets.PLUGIN_PACKAGE_PRIVATE_KEY }}
          DOCKSCOPE_PLUGIN_CATALOG_PRIVATE_KEY: ${{ secrets.PLUGIN_CATALOG_PRIVATE_KEY }}
          DOCKSCOPE_PLUGIN_PACKAGE_TRUST_POLICY: ${{ secrets.PLUGIN_PACKAGE_TRUST_POLICY }}
          DOCKSCOPE_PLUGIN_CATALOG_TRUST_STORE: ${{ secrets.PLUGIN_CATALOG_TRUST_STORE }}
        run: >-
          env SOURCE_DATE_EPOCH="$(git log -1 --format=%ct)" npm run plugins:catalog --
          --out dist/plugin-pages/plugins
          --base-url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/plugins/
          --package-key-id official-package-v1
          --catalog-key-id official-catalog-v1
          --require-signatures

      - name: Upload plugin catalog Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/plugin-pages

      - name: Publish to npm
        run: npm publish --ignore-scripts --provenance --access public

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "chore: release ${{ steps.version.outputs.version }}"
          git tag ${{ steps.version.outputs.version }}
          git remote set-url origin https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin main --tags

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/plugin-pages/plugins/catalog.json
            dist/plugin-pages/plugins/catalog.public.pem
            dist/plugin-pages/plugins/catalog-trust.json
            dist/plugin-pages/plugins/package.public.pem
            dist/plugin-pages/plugins/packages/*.dockscope-plugin

      - name: Lowercase image name
        run: echo "IMAGE=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: false
          sbom: false
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.version.outputs.version }}

  deploy-plugin-catalog:
    name: Deploy Official Plugin Catalog
    runs-on: ubuntu-latest
    needs: [release]
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}plugins/catalog.json
    steps:
      - name: Deploy catalog to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
