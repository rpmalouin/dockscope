name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Commit Messages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate commits
        env:
          # env indirection prevents script injection via commit messages
          HEAD_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
          else
            BEFORE="${{ github.event.before }}"
            # "before" is unusable on new branches and force pushes
            if [ "$BEFORE" != "0000000000000000000000000000000000000000" ] && git cat-file -e "$BEFORE" 2>/dev/null; then
              npx commitlint --from "$BEFORE" --to HEAD --verbose
            elif git rev-parse HEAD~1 >/dev/null 2>&1; then
              npx commitlint --from HEAD~1 --to HEAD --verbose
            else
              printf '%s\n' "$HEAD_COMMIT_MESSAGE" | npx commitlint --verbose
            fi
          fi

  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format:check
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [commitlint, lint-format, typecheck, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  plugin-compatibility:
    name: Plugin Compatibility (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    needs: [build]
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Compile an external SDK v1 consumer
        run: npm run typecheck:plugin-compat
      - name: Verify published package contents
        run: npm pack --dry-run
      - name: Smoke test process-isolated official plugin
        run: >-
          node dist/cli.js plugin:test
          --plugins plugins/official/kubernetes
          --plugin-permissions all

  plugin-catalog:
    name: Official Plugin Catalog
    runs-on: ubuntu-latest
    needs: [build, plugin-compatibility]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Build signed smoke catalog
        run: >-
          env SOURCE_DATE_EPOCH=1783728000 npm run plugins:catalog --
          --out dist/plugin-catalog
          --dev-keys
          --require-signatures
      - name: Verify catalog signature
        run: >-
          node dist/cli.js plugin:catalog
          --catalog dist/plugin-catalog/catalog.json
          --trust dist/plugin-catalog/catalog-trust.json
      - name: Install and load official Kubernetes plugin
        run: |
          node dist/cli.js plugin:catalog:install official.kubernetes \
            --catalog dist/plugin-catalog/catalog.json \
            --catalog-trust dist/plugin-catalog/catalog-trust.json \
            --registry-dir /tmp/dockscope-plugin-registry
          node dist/cli.js plugin:test \
            --plugins /tmp/dockscope-plugin-registry/official.kubernetes \
            --plugin-permissions all
      - name: Verify reproducible catalog artifacts
        run: |
          SOURCE_DATE_EPOCH=1783728000 npm run plugins:catalog -- --out /tmp/plugin-catalog-a
          SOURCE_DATE_EPOCH=1783728000 npm run plugins:catalog -- --out /tmp/plugin-catalog-b
          diff --recursive /tmp/plugin-catalog-a /tmp/plugin-catalog-b
      - uses: actions/upload-artifact@v4
        with:
          name: official-plugin-catalog
          path: dist/plugin-catalog/
          retention-days: 7

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [build, plugin-catalog]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
